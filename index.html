<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jeniffer Pott</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: black;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      color: #8A2BE2FF;
      text-shadow: 0 0 20px #8A2BE2FF;
    }

    p {
      font-size: 1.2rem;
      opacity: 0.7;
    }

    a {
      margin-top: 20px;
      padding: 10px 20px;
      background: #8A2BE2FF;
      color: white;
      text-decoration: none;
      font-size: 1rem;
      border-radius: 5px;
      text-shadow: 0 0 5px #8A2BE2FF;
      transition: 0.3s;
    }

    a:hover {
      text-shadow: 0 0 25px #8A2BE2FF;
    }
  </style>
</head>
<body>
  <h1>Projects coming soon!</h1>
</body>
</html>
