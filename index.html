<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jeniffer Pott - Projects</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <!-- Favicon -->
  <link rel="apple-touch-icon" sizes="180x180" href="favicon_io/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  
  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: black;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      overflow: hidden;
    }

    #particles-js {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .content {
      z-index: 1;
      position: relative;
    }

    h1 {
      font-size: 3rem;
      color: #8A2BE2FF;
      text-shadow: 0 0 20px #8A2BE2FF;
    }

    p {
      font-size: 1.2rem;
      opacity: 0.7;
      margin-top: 10px;
    }

    a {
      margin-top: 20px;
      padding: 10px 20px;
      background: #8A2BE2FF;
      color: white;
      text-decoration: none;
      font-size: 1rem;
      border-radius: 5px;
      text-shadow: 0 0 5px #8A2BE2FF;
      transition: 0.3s;
    }

    a:hover {
      text-shadow: 0 0 25px #8A2BE2FF;
    }
  </style>
</head>
<body>

<div id="particles-js"></div>

<div class="content">
  <h1>Jeniffer Pott</h1>
  <p>Projects are coming soon!</p>
  <a href="https://saipher-lab.github.io/">Return to main screen</a>
</div>

<!-- Partículas -->
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
<script>
particlesJS("particles-js", {
  particles: {
    number: { value: 80 },
    size: { value: 3 },
    move: { speed: 1 },
    line_linked: { enable: true }
  }
});
</script>

</body>
</html>
